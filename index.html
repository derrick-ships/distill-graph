<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<meta name="description" content="A star chart of 36 engineering patterns distilled from 7 open-source repositories. Tap a star to read the study doc and build spec." />

<title>Distill ▲ Graph</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Distill" />

<meta property="og:title" content="Distill ▲ Graph" />
<meta property="og:description" content="A star chart of 36 engineering patterns distilled from 7 repositories." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="grain" aria-hidden="true"></div>

<!-- LOADER -->
<div id="loader" aria-hidden="true">
  <div class="loader-inner">
    <svg class="mark" viewBox="0 0 48 44" width="40" height="37" aria-hidden="true">
      <path d="M24 2 L46 42 L2 42 Z" fill="none" stroke="currentColor" stroke-width="1.5" />
    </svg>
    <div class="loader-word">DISTILL <i>▲</i> GRAPH</div>
    <div class="loader-sub">Mapping 36 patterns across 7 repositories</div>
    <div class="loader-track"><span id="loader-bar"></span></div>
  </div>
</div>

<!-- TOP NAV -->
<header id="nav">
  <a class="brand" href="./" aria-label="Distill Graph — home">
    <svg class="brand-mark" viewBox="0 0 48 44" width="19" height="17" aria-hidden="true">
      <path d="M24 3 L45 41 L3 41 Z" fill="none" stroke="currentColor" stroke-width="2.2" />
    </svg>
    <span class="brand-word">DISTILL <em>GRAPH</em></span>
  </a>
  <div class="nav-actions">
    <button class="nav-btn" id="search-btn" aria-label="Search patterns">Search</button>
    <button class="nav-btn" id="view-btn" aria-pressed="false">Index</button>
    <a class="nav-btn" href="stats.html">Stats</a>
  </div>
  <div id="search-bar" hidden>
    <input id="search-input" type="search" placeholder="Search patterns, domains, repos" autocomplete="off" spellcheck="false" aria-label="Search patterns" />
    <button class="nav-btn" id="search-close" aria-label="Close search">Close</button>
  </div>
</header>

<!-- MAP -->
<main id="map-view">
  <svg id="sky" aria-label="Knowledge graph star map"></svg>

  <!-- domain context panel (top), shown when a constellation is active -->
  <div id="domain-info" hidden>
    <div class="di-head"><span class="di-dot"></span><span class="di-name"></span><span class="di-count"></span></div>
    <p class="di-desc"></p>
  </div>

  <div id="search-empty" hidden></div>
  <nav id="domain-rail" aria-label="Filter by domain"></nav>
  <p id="hint">Drag to pan · pinch or use + / − to zoom · tap a star</p>

  <div id="zoom-controls" aria-label="Zoom controls">
    <button id="zoom-in" aria-label="Zoom in">+</button>
    <button id="zoom-out" aria-label="Zoom out">−</button>
    <button id="zoom-reset" aria-label="Reset view">⊙</button>
  </div>

  <button id="legend-btn" aria-label="Toggle legend">Legend</button>
  <div id="legend" hidden></div>
</main>

<!-- INDEX -->
<section id="index-view" hidden>
  <div class="index-head">
    <p class="eyebrow">Repository intelligence</p>
    <h1>Index</h1>
    <p class="index-stats" id="index-stats"></p>
  </div>
  <div id="index-list"></div>
  <footer class="site-footer">
    <span>Distill ▲ Graph</span>
    <span>Built with Claude Code · data from <a href="https://github.com/derrick-ships/distill-it" target="_blank" rel="noopener">distill-it</a></span>
  </footer>
</section>

<!-- DETAIL SHEET -->
<div id="scrim" hidden></div>
<aside id="sheet" hidden aria-label="Pattern detail" role="dialog" aria-modal="true">
  <button class="sheet-grip" id="sheet-grip" aria-label="Close detail"></button>
  <div class="sheet-body" id="sheet-body"></div>
</aside>

<script src="vendor/d3.v7.min.js"></script>
<script src="app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
